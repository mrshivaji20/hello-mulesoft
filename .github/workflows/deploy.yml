name: Deploy to CloudHub

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Create Maven settings.xml
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                      https://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
            </server>
            <server>
              <id>mulesoft-releases</id>
              <username>${{ secrets.ANYPOINT_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
            </server>
          </servers>
        </settings>
        EOF
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build application
      run: mvn clean package
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
      
    - name: Deploy to CloudHub
      run: |
        mvn deploy -DmuleDeploy \
          -Danypoint.username=${{ secrets.ANYPOINT_USERNAME }} \
          -Danypoint.password=${{ secrets.ANYPOINT_PASSWORD }} \
          -DapplicationName=hello-mulesoft-app \
          -Denvironment=Sandbox \
          -Dregion=us-east-2 \
          -DmuleVersion=4.11.3 \
          -Dworkers=1 \
          -DworkerType=MICRO
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}